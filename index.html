<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aurélien Lannoye, Portfolio EPHEC</title>
  <meta name="description" content="Portfolio EPHEC d'Aurélien Lannoye, étudiant en Bac 3 Technologies de l'Informatique. Projet pro, activités d'acquisition de compétences, projets de jeux vidéo et SaaS." />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/world.css">
</head>
<body>

  <!-- ========================================================
       SECTION 1 : SIDE-SLIDER (description perso, projet pro)
  ======================================================== -->
  <header id="top" class="top-hero" role="banner">

    <!-- Game/Mouse toggle -->
    <div class="controls left">
      <div class="mode-toggle" id="modeToggle" aria-label="Mode d'interaction">
        <button type="button" data-mode="game" class="chip active" aria-pressed="true">Jeu</button>
        <button type="button" data-mode="mouse" class="chip" aria-pressed="false">Souris</button>
      </div>
    </div>

    <!-- Aide -->
    <button class="help-chip" id="helpChip" type="button" aria-label="Afficher ou masquer l'aide">?</button>

    <div class="controls-hints" id="controlsHints" role="status" aria-live="polite" hidden>
      <figure class="hint">
        <img src="assets/ui/keys-arrows.png" alt="Déplacements gauche droite avec les flèches ou A et D" width="180" height="80" loading="lazy">
        <figcaption>Bouger : ← → (ou A / D)</figcaption>
      </figure>
      <figure class="hint">
        <img src="assets/ui/key-space.png" alt="Sauter avec la barre Espace" width="180" height="80" loading="lazy">
        <figcaption>Sauter : Espace</figcaption>
      </figure>
      <p class="hint-note">Appuie sur <strong>H</strong> pour afficher ou cacher l'aide</p>
    </div>

    <!-- 4 boutons "?" : GitHub, Mail, CV, LinkedIn -->
    <nav class="controls right q-actions" aria-label="Liens rapides">
      <button class="qbtn pop-box" type="button"
              data-item="github"
              data-href="https://github.com/CryptoGot?tab=repositories"
              aria-label="GitHub"><span class="q" aria-hidden="true">?</span></button>

      <button class="qbtn pop-box" type="button"
              data-item="mail"
              data-href="mailto:aurlannoye@gmail.com"
              aria-label="Email"><span class="q" aria-hidden="true">?</span></button>

      <button class="qbtn pop-box" type="button"
              data-item="cv"
              data-href="docs/CV_2025-10-05_Aurelien_Lannoye.pdf"
              aria-label="CV (PDF)"><span class="q" aria-hidden="true">?</span></button>

      <button class="qbtn pop-box" type="button"
              data-item="linkedin"
              data-href="https://www.linkedin.com/in/aurelien-lannoye/"
              aria-label="LinkedIn"><span class="q" aria-hidden="true">?</span></button>
    </nav>

    <!-- Titre (compact, en haut centre) -->
    <div class="hero-title">
      <div class="title-banner compact">
        <span class="pins" aria-hidden="true"></span>
        <h1 class="title title-3d compact-portfolio">PORTFOLIO</h1>
        <h1 class="title title-3d compact-name" data-text="AURÉLIEN LANNOYE">AURÉLIEN LANNOYE</h1>
      </div>
    </div>

    <!-- Sol et plateformes -->
    <div class="ground-bar" aria-hidden="true">
      <div class="seg left collider"></div>
      <div class="gap"></div>
      <div class="seg right collider"></div>
    </div>

    <!-- Plateforme à droite pour atteindre les cases ? en sautant -->
    <div class="platform p2 collider" aria-hidden="true"></div>

    <!-- Plateforme centrale (au-dessus du trou) avec coffre projet pro -->
    <div class="platform p3 collider" aria-hidden="true"></div>

    <!-- 3 COFFRES : Forces (vert) à gauche, Projet pro (doré) au centre sur p3, Faiblesses (orange) à droite -->
    <button class="treasure-chest chest-forces" id="chestForces" type="button"
            aria-label="Ouvrir le coffre Mes forces">
      <span class="chest-base"></span>
      <span class="chest-lid"></span>
      <span class="chest-lock"></span>
      <span class="chest-glow" aria-hidden="true"></span>
      <span class="chest-hint">Mes forces</span>
      <span class="chest-key-prompt" aria-hidden="true">E</span>
    </button>

    <button class="treasure-chest chest-projet" id="chestProjet" type="button"
            aria-label="Ouvrir le coffre Projet pro et objectifs">
      <span class="chest-base"></span>
      <span class="chest-lid"></span>
      <span class="chest-lock"></span>
      <span class="chest-glow" aria-hidden="true"></span>
      <span class="chest-hint">Projet pro</span>
      <span class="chest-key-prompt" aria-hidden="true">E</span>
    </button>

    <button class="treasure-chest chest-faiblesses" id="chestFaiblesses" type="button"
            aria-label="Ouvrir le coffre Mes faiblesses">
      <span class="chest-base"></span>
      <span class="chest-lid"></span>
      <span class="chest-lock"></span>
      <span class="chest-glow" aria-hidden="true"></span>
      <span class="chest-hint">Mes faiblesses</span>
      <span class="chest-key-prompt" aria-hidden="true">E</span>
    </button>

    <!-- CTA "Voir mes projets" : pointe vers le trou, mène au top-down -->
    <div class="hero-cta">
      <button id="whoBtn" class="who-btn" type="button">Voir mes projets</button>
      <div class="who-arrow arrow-jump" aria-hidden="true">
        <svg viewBox="0 0 32 40" width="32" height="40" focusable="false">
          <path d="M16 4 L16 28 M6 22 L16 32 L26 22" stroke="#1e2438" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
    </div>

    <!-- Canvas du jeu -->
    <canvas id="gameLayer" class="game-layer" aria-hidden="true"></canvas>
  </header>

  <main id="main" role="main">

    <!-- ========================================================
         SECTION 2 : MONDE TOP-DOWN (8 zones thématiques)
    ======================================================== -->
    <section id="world" class="world-section" aria-labelledby="world-title">
      <h2 id="world-title" class="visually-hidden">Mon monde d'activités</h2>

      <div class="world-hud">
        <a href="#top" class="world-back">← Retour</a>
        <div class="world-progress" id="worldProgress">
          <span class="zone-label">Forêt</span>
        </div>
        <button class="world-help" type="button" id="worldHelp" aria-label="Aide top-down">?</button>
      </div>

      <div class="world-controls-hint" id="worldHint">
        <p><strong>ZQSD</strong> ou <strong>flèches</strong> pour bouger, <strong>E</strong> pour interagir avec une pancarte</p>
      </div>

      <canvas id="worldCanvas" class="world-canvas" aria-hidden="true"></canvas>
    </section>
  </main>

  <!-- ========================================================
       MODAL générique pour les coffres (Forces, Faiblesses, Projet pro)
  ======================================================== -->
  <div class="modal" id="modalChest" hidden role="dialog" aria-modal="true" aria-labelledby="modalChestTitre">
    <div class="modal-backdrop" data-modal-close></div>
    <div class="modal-content">
      <button class="modal-close" type="button" data-modal-close aria-label="Fermer">×</button>
      <h2 id="modalChestTitre" class="modal-title"></h2>
      <div class="modal-body" id="modalChestBody"></div>
    </div>
  </div>

  <!-- ========================================================
       MODAL panneaux du monde (projet, formation, challenge)
  ======================================================== -->
  <div class="modal modal-zone" id="modalZone" hidden role="dialog" aria-modal="true" aria-labelledby="modalZoneTitre">
    <div class="modal-backdrop" data-modal-close></div>
    <div class="modal-content modal-zone-content">
      <button class="modal-close" type="button" data-modal-close aria-label="Fermer">×</button>
      <header class="modal-zone-header">
        <span class="modal-zone-icon" id="modalZoneIcon" aria-hidden="true"></span>
        <h2 id="modalZoneTitre" class="modal-title"></h2>
        <p class="modal-zone-meta" id="modalZoneMeta"></p>
      </header>
      <div class="modal-body modal-zone-body" id="modalZoneBody"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/content.js" defer></script>
  <script src="js/main.js" defer></script>
  <script src="js/world.js" defer></script>
</body>
</html>
